<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Tin Học 9 - Leaderboard Full</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; --border: #cbd5e1; }
        body.dark-mode { --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px 20px 100px 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        #timer { color: var(--error); font-size: 1.6rem; background: rgba(239, 68, 68, 0.1); padding: 5px 20px; border-radius: 10px; border: 2px solid var(--error); }
        .live-stats { display: flex; gap: 10px; margin-bottom: 20px; font-size: 0.9rem; flex-wrap: wrap; }
        .stat-item { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); }
        .question-card { display: none; }
        .question-card.active { display: block; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .options-grid { display: grid; gap: 10px; margin-top: 15px; }
        .option-btn { padding: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); text-align: left; cursor: pointer; transition: 0.2s; }
        .option-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--error) !important; color: white; border-color: var(--error); }
        .ds-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .ds-table th, .ds-table td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        .ds-btn { width: 100%; padding: 10px; cursor: pointer; border: 1px solid var(--border); border-radius: 5px; background: var(--card); color: var(--text); font-weight: bold; }
        .ds-btn.ans-correct { background: var(--success) !important; color: white; }
        .ds-btn.ans-wrong { background: var(--error) !important; color: white; }
        .leaderboard-container { margin-top: 30px; max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
        .leaderboard-table { width: 100%; border-collapse: collapse; background: var(--card); }
        .leaderboard-table th { position: sticky; top: 0; background: var(--primary); color: white; padding: 15px; z-index: 10; }
        .leaderboard-table td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; }
        .nav-btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .theme-toggle { position: fixed; bottom: 50px; left: 20px; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 1001; width: 50px; height: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .footer-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; color: #cbd5e1; padding: 10px 0; font-size: 0.8rem; text-align: center; font-weight: bold; z-index: 1000; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-meta">
        <div id="live-clock">Đang tải thời gian...</div>
        <div id="timer">30:00</div>
    </div>

    <div class="container">
        <div id="login-screen" style="text-align:center;">
            <h1 style="color: var(--primary);">HỆ THỐNG THI TRỰC TUYẾN</h1>
            <p style="opacity: 0.7;">Dữ liệu công khai - Tự động Reset lúc 07:00</p>
            
            <div style="background: rgba(37, 99, 235, 0.05); padding: 20px; border-radius: 15px; margin: 20px 0;">
                <input type="text" id="uName" placeholder="Nhập Họ và Tên..." style="padding:15px; width:80%; max-width:350px; margin:10px; border-radius:8px; border:1px solid var(--border); font-size: 1rem;"><br>
                <input type="text" id="uClass" placeholder="Nhập Lớp (VD: 9/1)..." style="padding:15px; width:80%; max-width:350px; margin:10px; border-radius:8px; border:1px solid var(--border); font-size: 1rem;"><br>
                <button class="nav-btn" style="background:var(--primary); color:white; width: 200px; margin-top: 10px;" onclick="startQuiz()">VÀO THI NGAY</button>
            </div>
            
            <h3>🏆 BẢNG XẾP HẠNG TOÀN TRƯỜNG (FULL)</h3>
            <div class="leaderboard-container">
                <table class="leaderboard-table">
                    <thead><tr><th>Hạng</th><th>Họ Tên</th><th>Lớp</th><th>Điểm (%)</th><th>Thời gian</th></tr></thead>
                    <tbody id="home-leaderboard-body">
                        <tr><td colspan="5">Chưa có dữ liệu người thi...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="quiz-area" style="display:none">
            <div class="live-stats">
                <div class="stat-item" style="color:var(--success); font-weight:bold;">✅ Đúng: <span id="live-correct">0</span></div>
                <div class="stat-item" style="color:var(--error); font-weight:bold;">❌ Sai: <span id="live-wrong">0</span></div>
                <div class="stat-item">📊 Câu: <span id="live-progress">0/0</span></div>
            </div>
            <div id="question-container"></div>
            <div style="display:flex; justify-content: space-between; margin-top: 30px;">
                <button class="nav-btn" style="background:#64748b; color:white;" onclick="move(-1)">Câu trước</button>
                <button class="nav-btn" style="background:var(--primary); color:white;" id="nextBtn" onclick="move(1)">Tiếp theo</button>
                <button class="nav-btn" style="background:var(--error); color:white; display:none;" id="submitBtn" onclick="endQuiz()">NỘP BÀI</button>
            </div>
        </div>

        <div id="result-screen" style="display:none; text-align:center;">
            <h2 style="color: var(--success);">HOÀN THÀNH BÀI THI!</h2>
            <div id="score-box" style="font-size: 3.5rem; margin: 20px; font-weight: 800; color: var(--primary);">0%</div>
            <button class="nav-btn" style="background:var(--primary); color:white;" onclick="location.reload()">Quay lại trang chủ</button>
        </div>
    </div>

    <button class="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">🌓</button>
    <div class="footer-fixed">CHÚC BẠN THI TỐT</div>

    <script>
      // PHẦN I: 36 CÂU TRẮC NGHIỆM
        const database = [
            // PHẦN I: 36 CÂU TRẮC NGHIỆM (Đã đầy đủ)
            { id: 1, q: "Công cụ Xác thực Dữ liệu (Data Validation) được sử dụng trong phần mềm bảng tính nhằm mục đích gì?", options: ["Tự động định dạng văn bản trong ô.","Hạn chế kiểu dữ liệu hoặc giá trị nhập vào ô.","Tự động lưu trữ dữ liệu nhập vào ô.","Tạo công thức tính toán cho ô dữ liệu."], correct: 1 },
            { id: 2, q: "Khi nào màn hình sẽ hiển thị thông báo lỗi trong Data Validation?", options: ["Khi ô không có công thức.","Khi nhập dữ liệu không đúng với điều kiện xác thực.","Khi ô trống không nhập liệu.","Khi nhập dữ liệu trùng lặp trong bảng."], correct: 1 },
            { id: 3, q: "Để nhập thông báo nhắc nhở người dùng khi nhập dữ liệu, bạn sử dụng thẻ nào trong Data Validation?", options: ["Settings","Input Message","Error Alert","Data Tools"], correct: 1 },
            { id: 4, q: "Khi chọn kiểu dữ liệu Decimal trong Data Validation, dữ liệu nào được chấp nhận?", options: ["Số nguyên.","Số thập phân.","Văn bản.","Danh sách."], correct: 1 },
            { id: 5, q: "Tùy chọn Custom trong Data Validation được dùng để làm gì?", options: ["Tạo danh sách tùy chỉnh.","Xác thực dựa trên công thức tùy chỉnh.","Tự động định dạng dữ liệu.","Tính toán tự động giá trị."], correct: 1 },
            { id: 6, q: "Trong hộp thoại Data Validation, thẻ Error Alert cho phép bạn làm gì?", options: ["Định dạng dữ liệu trong ô.","Thiết lập thông báo lỗi khi nhập sai dữ liệu.","Chọn kiểu dữ liệu nhập vào ô.","Tự động kiểm tra lỗi trong bảng tính."], correct: 1 },
            { id: 7, q: "Dữ liệu kiểu ngày tháng được xác thực bằng tùy chọn nào?", options: ["Whole Number","Date","Decimal","Time"], correct: 1 },
            { id: 8, q: "Khi xác thực dữ liệu kiểu List, điều gì xảy ra nếu dữ liệu nguồn thay đổi?", options: ["Danh sách sẽ tự động cập nhật.","Danh sách sẽ bị vô hiệu hóa.","Phải chỉnh sửa lại Data Validation.","Không có thay đổi nào xảy ra."], correct: 0 },
            { id: 9, q: "Công thức nào dưới đây dùng để đếm số ô có giá trị \"A\" trong vùng A1:A10?", options: ["=COUNTIF(A1:A10,\"A\")","=COUNT(A1:A10,\"A\")","=IF(COUNTIF(A1:A10,\"A\"))","=COUNT(A1:A10)"], correct: 0 },
            { id: 10, q: "Khi sao chép công thức =COUNTIF($B$3:$B$10,F2) từ ô G2 xuống G3, công thức sẽ thay đổi như thế nào?", options: ["Vẫn giữ nguyên vì có dấu $.","Thay đổi thành =COUNTIF(B4:B11,F3).","Chỉ thay đổi tham chiếu F2 thành F3.","Thay đổi cả tham chiếu vùng và điều kiện."], correct: 2 },
            { id: 11, q: "Nếu công thức =COUNTIF(B3:B10,F2) không sử dụng dấu $ thì điều gì xảy ra khi sao chép xuống G3?", options: ["Kết quả đúng.","Kết quả sai do phạm vi vùng bị thay đổi.","Không ảnh hưởng vì COUNTIF tự động nhận diện vùng.","Sai cú pháp."], correct: 1 },
            { id: 12, q: "Công thức nào sau đây dùng để đếm số ô trong vùng B3:B10 có giá trị lớn hơn 100?", options: ["=COUNTIF(B3:B10,\">100\")","=COUNTIF(B3:B10,\"100>\")","=COUNTIF(B3:B10,100)","=COUNTIF(B3:B10,\"*100*\")"], correct: 0 },
            { id: 13, q: "Hàm COUNTIF có thể sử dụng để:", options: ["Tính tổng các giá trị trong một vùng.","Đếm số ô thỏa mãn một điều kiện.","Kiểm tra giá trị lớn nhất trong vùng.","Đếm tất cả các ô trống trong vùng."], correct: 1 },
            { id: 14, q: "Công thức nào trả về số ô không trống trong vùng A1:A10?", options: ["=COUNTIF(A1:A10,\"<>\")","=COUNTIF(A1:A10,\"*\")","=COUNTIF(A1:A10,\" \")","=COUNT(A1:A10)"], correct: 0 },
            { id: 15, q: "Công thức =COUNTIF(A1:A10,\"<50\") trả về:", options: ["Tổng số ô có giá trị nhỏ hơn 50.","Tổng giá trị của các ô nhỏ hơn 50.","Số ô có giá trị bằng 50.","Giá trị lớn nhất trong vùng."], correct: 0 },
            { id: 16, q: "Trong công thức =COUNTIF(A1:A10,A2), giá trị A2 là:", options: ["Vùng dữ liệu.","Điều kiện đếm.","Kết quả cần tìm.","Hàm COUNTIF."], correct: 1 },
            { id: 17, q: "Điều kiện nào sau đây đếm tất cả các ô chứa chữ cái \"A\"?", options: ["*A*","=\"A\"","\"A\"","\"*A*\""], correct: 3 },
            { id: 18, q: "Điều kiện \"<>\" trong COUNTIF có nghĩa là:", options: ["Bằng rỗng.","Không rỗng.","Lớn hơn.","Nhỏ hơn."], correct: 1 },
            { id: 19, q: "Công thức nào đếm số ô chứa giá trị số dương?", options: ["=COUNTIF(A1:A10,\">0\")","=COUNTIF(A1:A10,\"<=0\")","=COUNTIF(A1:A10,\"0\")","=COUNTIF(A1:A10,\"<0\")"], correct: 0 },
            { id: 20, q: "Công thức COUNTIF nào trả về giá trị lỗi?", options: ["=COUNTIF(A1:A10,\">=0\")","=COUNTIF(A1:A10,\"A\")","=COUNTIF(A1:A10)","=COUNTIF(A1:A10,\"<50\")"], correct: 2 },
            { id: 21, q: "Ký tự đại diện nào được sử dụng trong điều kiện COUNTIF?", options: ["$ và &.","* và ?.","# và @.","! và %."], correct: 1 },
            { id: 22, q: "Công thức =COUNTIF(A1:A10,\"<>0\") trả về:", options: ["Số ô có giá trị khác 0.","Số ô có giá trị bằng 0.","Tổng giá trị khác 0.","Tổng giá trị bằng 0."], correct: 0 },
            { id: 23, q: "Hàm SUMIF được sử dụng để làm gì?", options: ["Đếm số ô thỏa mãn điều kiện.","Tính tổng các giá trị trong một phạm vi thỏa mãn điều kiện.","Tính giá trị trung bình của các ô.","Hiển thị giá trị lớn nhất trong một phạm vi."], correct: 1 },
            { id: 24, q: "Công thức nào đúng để tính tổng các ô trong cột D, với điều kiện ở cột B là \"Chi tiêu\"?", options: ["=SUMIF(B3:B10,\"Chi tiêu\",D3:D10)","=SUMIF(D3:D10,\"Chi tiêu\",B3:B10)","=SUMIF(\"Chi tiêu\",B3:B10,D3:D10)","=SUMIF(B3:D10,\"Chi tiêu\",D3:D10)"], correct: 0 },
            { id: 25, q: "Khi nào cần sử dụng địa chỉ tuyệt đối trong hàm SUMIF?", options: ["Khi cần cố định phạm vi hoặc điều kiện để sao chép công thức.","Khi chỉ tính tổng một ô duy nhất.","Khi điều kiện là một biểu thức logic.","Khi sử dụng nhiều hàm SUMIF trong một công thức."], correct: 0 },
            { id: 26, q: "Công thức =SUMIF($B$3:$B$10,\"A\",$D$3:$D$10) thực hiện điều gì?", options: ["Đếm số ô trong vùng B3:B10 có giá trị là \"A\".","Tính tổng các giá trị trong vùng D3:D10, với điều kiện ở B3:B10 là \"A\".","Tính tổng các giá trị trong vùng B3:B10 thỏa mãn điều kiện \"A\".","Tính trung bình các giá trị ở D3:D10."], correct: 1 },
            { id: 27, q: "Hàm SUMIF trả về kết quả nào khi không có giá trị nào thỏa mãn điều kiện?", options: ["Lỗi #VALUE!.","Lỗi #N/A.","Kết quả là 0.","Kết quả không xác định."], correct: 2 },
            { id: 28, q: "Công thức =SUMIF(B3:B10,F2,D3:D10) hoạt động thế nào?", options: ["Tính tổng các giá trị trong D3:D10 tương ứng với giá trị F2 trong B3:B10.","Tính tổng các giá trị F2 trong vùng D3:D10.","Đếm số lần F2 xuất hiện trong B3:B10.","Kiểm tra tính hợp lệ của giá trị F2."], correct: 0 },
            { id: 29, q: "Công thức =SUMIF(B3:B10,\">500\",D3:D10) thực hiện gì?", options: ["Tính tổng các giá trị trong B3:B10 lớn hơn 500.","Tính tổng các giá trị trong D3:D10 lớn hơn 500.","Tính tổng các giá trị trong D3:D10, tương ứng với các ô trong B3:B10 có giá trị lớn hơn 500.","Đếm số ô trong B3:B10 lớn hơn 500."], correct: 2 },
            { id: 30, q: "Hàm SUMIF có thể sử dụng nhiều điều kiện cùng lúc không?", options: ["Có, bằng cách viết nhiều điều kiện trong criteria.","Có, bằng cách dùng ký tự \"AND\" trong criteria.","Không, chỉ áp dụng một điều kiện duy nhất.","Có, nếu kết hợp với hàm SUM."], correct: 2 },
            { id: 31, q: "Điều kiện \"<=1000\" trong hàm SUMIF được hiểu như thế nào?", options: ["Tính tổng các giá trị nhỏ hơn 1000.","Tính tổng các giá trị lớn hơn hoặc bằng 1000.","Tính tổng các giá trị nhỏ hơn hoặc bằng 1000.","Tính tổng các giá trị bằng 1000."], correct: 2 },
            { id: 32, q: "Trong công thức =SUMIF(B3:B10,\"*thực phẩm*\",D3:D10), ký tự * có nghĩa gì?", options: ["Đại diện cho một ký tự bất kỳ.","Đại diện cho chuỗi ký tự bất kỳ.","Đại diện cho điều kiện \"thực phẩm\".","Không có ý nghĩa gì đặc biệt."], correct: 1 },
            { id: 33, q: "Công thức nào đúng để tính tổng các giá trị trong D3:D10, với điều kiện ở cột B khác \"Giải trí\"?", options: ["=SUMIF(B3:B10,\"<>Giải trí\",D3:D10)","=SUMIF(B3:B10,\"Giải trí\",D3:D10)","=SUMIF(D3:D10,\"<>Giải trí\",B3:B10)","=SUMIF(B3:B10,NOT \"Giải trí\",D3:D10)"], correct: 0 },
            { id: 34, q: "Công thức sử dụng đúng hàm IF để kiểm tra nếu tỉ lệ chi cho mục tiêu \"Nhu cầu thiết yếu\" lớn hơn 50% thì trả về \"Nhiều hơn\", ngược lại trả về \"Ít hơn\"?", options: ["=IF(N3<50%,\"Nhiều hơn\",\"Ít hơn\")","=IF(N3>50%,\"Nhiều hơn\",\"Ít hơn\")","=IF(N3=50%,\"Nhiều hơn\",\"Ít hơn\")","=IF(N3>50%,\"Ít hơn\",\"Nhiều hơn\")"], correct: 1 },
            { id: 35, q: "Để kiểm tra nếu doanh thu lớn hơn 15 triệu thì tỉ lệ thưởng là 4% (0.04), công thức đúng là gì?", options: ["=IF(A1>=15,000,4%,0)","=IF(A1>15,000,\"4%\",\"0%\")","=IF(A1>15,000,0.04,0)","=IF(A1<15,000,0.04,0)"], correct: 2 },
            { id: 36, q: "Trong công thức =IF(N4>30%,\"Nhiều hơn\",\"Ít hơn\"), nếu N4 = 25%, kết quả sẽ là gì?", options: ["Nhiều hơn","Ít hơn","Sai công thức","Không xác định"], correct: 1 },

            // PHẦN II: 6 CÂU HỎI ĐÚNG SAI (BẢNG)
            { 
                id: "DS1", type: "table", 
                title: "Câu 1: Một trong những công cụ hữu ích trong việc phân tích dữ liệu là hàm COUNTIF. Hàm này cho phép chúng ta đếm số lượng ô thỏa mãn một điều kiện nhất định. Dưới đây là một số nhận định về khả năng của hàm COUNTIF:",
                subQuestions: [
                    { text: "a) Hàm COUNTIF rất hữu ích trong việc thống kê dữ liệu bán hàng, chẳng hạn như đếm số lượng sản phẩm bán ra trong một tháng.", correct: true },
                    { text: "b) Hàm COUNTIF chỉ có thể đếm các giá trị số, không thể đếm các giá trị văn bản.", correct: false },
                    { text: "c) Để đếm số lượng ô có giá trị lớn hơn một số cụ thể, ta vẫn sử dụng hàm COUNTIF.", correct: true },
                    { text: "d) Hàm COUNTIF chỉ có thể áp dụng cho một điều kiện, không thể kết hợp nhiều điều kiện.", correct: true }
                ]
            },
            { 
                id: "DS2", type: "table", 
                title: "Câu 2: Một cửa hàng bán đồ thể thao muốn thống kê doanh số bán hàng trong tháng 12. Họ đã ghi lại thông tin về mỗi giao dịch vào một bảng tính Excel, bao gồm các cột: Ngày bán, tên sản phẩm, giá bán của sản phẩm, tên khách hàng, phương thức thanh toán. Dựa trên tình huống đó, hãy đánh giá tính đúng/sai của các nhận định sau:",
                subQuestions: [
                    { text: "a) Để đếm số giao dịch thanh toán bằng thẻ, ta có thể sử dụng công thức: =COUNTIF(Phương thức thanh toán, \"thẻ\").", correct: true },
                    { text: "b) Để đếm số lượng sản phẩm giày thể thao, ta có thể sử dụng công thức: =COUNTIF(Tên sản phẩm, \"giày thể thao\").", correct: true },
                    { text: "c) Hàm COUNTIF không thể sử dụng để đếm số lượng giao dịch trong một khoảng thời gian cụ thể.", correct: false },
                    { text: "d) Để đếm số khách hàng trong tuần thứ 3 của tháng 12, ta chỉ cần đếm số hàng trong cột \"Khách hàng\".", correct: false }
                ]
            },
            { 
                id: "DS3", type: "table", 
                title: "Câu 3: Gia đình Khuê muốn theo dõi chi tiêu hàng tháng của gia đình. Hậu đã lập một bảng tính Excel để ghi lại các khoản chi tiêu bao gồm: Ngày chi tiêu, Loại chi (thực phẩm, sinh hoạt, giải trí…), số tiền chi. Dựa vào tình huống trên, hãy đánh giá tính đúng của các nhận định sau:",
                subQuestions: [
                    { text: "a) Nếu muốn tính tổng tiền chi cho các loại chi có số tiền lớn hơn 1 triệu đồng, ta có thể điều chỉnh điều kiện thành: \">1000000\".", correct: true },
                    { text: "b) Hàm SUMIF chỉ có thể sử dụng để tính tổng tiền chi tiêu cho một loại chi cụ thể trong một tháng.", correct: true },
                    { text: "c) Để tạo biểu đồ thể hiện cấu trúc chi tiêu, có thể sử dụng kết quả tính toán từ hàm SUMIF.", correct: true },
                    { text: "d) Hàm SUMIF không thể sử dụng để tìm kiếm các giao dịch có chứa từ khóa cụ thể trong cột \"Loại chi\".", correct: false }
                ]
            },
            { 
                id: "DS4", type: "table", 
                title: "Nhóm bạn Hoa đang thực hiện một dự án giày học đường. Để quản lý chi tiêu hiệu quả, nhóm của Hoa lập một bảng tính Excel để ghi lại tất cả các khoản thu, chi phát sinh trong quá trình thực hiện dự án. Bảng tính này bao gồm: số thứ tự, ngày phát sinh giao dịch (thu hoặc chi), mục đích của giao dịch, số tiền phát sinh. Dựa vào thông tin này, hãy đánh giá các nhận định sau:",
                subQuestions: [
                    { text: "a) Để tính tổng chi phí cho vật liệu, ta có thể sử dụng công thức: =SUMIF(C:C,\"mua vật liệu\",D:D).", correct: true },
                    { text: "b) Để tính tổng thu nhập từ hoạt động bán hàng, ta có thể sử dụng công thức: =SUMIF(\"Thu\",C:C,\"bán hàng\").", correct: false },
                    { text: "c) Để tính tổng chi phí phát sinh trong tháng 9, ta chỉ cần sử dụng công thức: =SUMIF(A:A,\"*9*\",D:D).", correct: true },
                    { text: "d) Để tính tỷ lệ phần trăm chi phí vật liệu so với tổng chi phí, ta có thể dùng: =SUMIF(C:C,\"mua vật liệu\",D:D)/SUM(D:D).", correct: true }
                ]
            },
            { 
                id: "DS5", type: "table", 
                title: "Câu 5: Một trong những ưu điểm quan trọng của hàm IF là khả năng đưa ra quyết định logic. Hậu đã lập bảng này cho phép tạo ra các công thức linh hoạt. Dựa vào bảng, đánh giá các nhận định sau:",
                subQuestions: [
                    { text: "a) Hàm IF có thể lồng ghép nhiều điều kiện để tạo ra các quyết định phức tạp hơn.", correct: true },
                    { text: "b) Hàm IF có thể kết hợp với các hàm khác để thực hiện các phép tính tổng hợp.", correct: true },
                    { text: "c) Hàm IF chỉ có thể sử dụng để so sánh các giá trị số, không thể so sánh văn bản.", correct: false },
                    { text: "d) Hàm IF chỉ phù hợp cho các bảng tính đơn giản, không thể áp dụng cho các bảng tính lớn và phức tạp.", correct: false }
                ]
            },
            { 
                id: "DS6", type: "table", 
                title: "Câu 6: Trong một bộ hồ sơ về Excel, giáo viên đưa ra một tình huống thực tế: Một công ty đang nhập liệu hệ thống chấm công dựa trên nhận dạng khuôn mặt. Để mô phỏng hệ thống, họ sẽ nhập các cột như Tên, Giờ vào, Giờ ra, và một cột đánh giá. Dựa vào tình huống, hãy đánh giá tính đúng/sai:",
                subQuestions: [
                    { text: "a) Để đánh giá một nhân viên có mặt hay vắng mặt, ta có thể sử dụng công thức: =IF(C2>D2,\"Vắng mặt\",\"Có mặt\").", correct: true },
                    { text: "b) Để tính số lượng nhân viên vắng mặt trong một ngày, ta có thể kết hợp hàm IF với hàm COUNTIF.", correct: true },
                    { text: "c) Để tạo cột cảnh báo khi nhân viên đến muộn, ta có thể sử dụng hàm IF kết hợp với một giá trị giờ quy định.", correct: true },
                    { text: "d) Hàm IF chỉ có thể sử dụng để so sánh giờ vào và giờ ra, không thể sử dụng để tính toán thời gian làm việc.", correct: false }
                ]
            }
        ];


        let qList = []; let cur = 0; let answers = {}; let time = 1800; let timer; let resultStats = { correct: 0, wrong: 0 };

        // --- HỆ THỐNG LƯU TRỮ VÀ HIỂN THỊ BXH ---
        function loadLeaderboard() {
            // Lấy dữ liệu từ LocalStorage (đảm bảo luôn hiển thị kể cả khi không có Firebase)
            let board = JSON.parse(localStorage.getItem('full_rank_local')) || [];
            
            // Sắp xếp điểm cao lên đầu
            board.sort((a, b) => b.score - a.score);

            const html = board.map((e, i) => `
                <tr class="${i < 3 ? 'rank-top' : ''}">
                    <td>${i + 1}</td>
                    <td>${e.name}</td>
                    <td>${e.class}</td>
                    <td>${e.score}%</td>
                    <td>${e.time}</td>
                </tr>`).join('');
            
            document.getElementById('home-leaderboard-body').innerHTML = html || '<tr><td colspan="5">Chưa có ai thi. Hãy là người đầu tiên!</td></tr>';
        }

        // Tự động load BXH khi mở web
        window.onload = () => {
            loadLeaderboard();
            setInterval(() => {
                document.getElementById('live-clock').innerText = new Date().toLocaleString('vi-VN');
            }, 1000);
        };

        function startQuiz() {
            const n = document.getElementById('uName').value;
            const c = document.getElementById('uClass').value;
            if(!n || !c) return alert("Vui lòng nhập đầy đủ Tên và Lớp!");

            qList = [...database].sort(() => Math.random() - 0.5);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            
            render();
            timer = setInterval(() => {
                time--;
                let min = Math.floor(time/60), sec = time%60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if(time <= 0) endQuiz();
            }, 1000);
        }

        function render() {
            const container = document.getElementById('question-container');
            container.innerHTML = '';
            qList.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = `question-card ${i === cur ? 'active' : ''}`;
                if(q.type === 'table') {
                    let rows = q.subQuestions.map((sq, si) => {
                        let userChoice = (answers[i] && answers[i][si] !== undefined) ? answers[i][si] : null;
                        let tCls = userChoice !== null ? (sq.correct === true ? 'ans-correct' : (userChoice === true ? 'ans-wrong' : '')) : '';
                        let fCls = userChoice !== null ? (sq.correct === false ? 'ans-correct' : (userChoice === false ? 'ans-wrong' : '')) : '';
                        return `<tr><td>${sq.text}</td><td><button class="ds-btn ${tCls}" onclick="checkDS(${i}, ${si}, true)">Đúng</button></td><td><button class="ds-btn ${fCls}" onclick="checkDS(${i}, ${si}, false)">Sai</button></td></tr>`;
                    }).join('');
                    div.innerHTML = `<h3>Câu ${i+1}: Đúng/Sai</h3><p><strong>${q.title}</strong></p><table class="ds-table"><thead><tr><th>Nhận định</th><th style="width:80px">Đúng</th><th style="width:80px">Sai</th></tr></thead><tbody>${rows}</tbody></table>`;
                } else {
                    div.innerHTML = `<h3>Câu ${i+1}: ${q.q}</h3><div class="options-grid">
                        ${q.options.map((opt, idx) => {
                            let cls = ""; if(answers[i] !== undefined) { if(idx === q.correct) cls = "correct"; else if(answers[i] === idx) cls = "wrong"; }
                            return `<button class="option-btn ${cls}" onclick="checkTN(${i}, ${idx})">${String.fromCharCode(65+idx)}. ${opt}</button>`;
                        }).join('')}</div>`;
                }
                container.appendChild(div);
            });
            document.getElementById('live-progress').innerText = `${cur + 1}/${qList.length}`;
            document.getElementById('nextBtn').style.display = (cur === qList.length - 1) ? 'none' : 'inline-block';
            document.getElementById('submitBtn').style.display = (cur === qList.length - 1) ? 'inline-block' : 'none';
        }

        function checkTN(qi, oi) {
            if(answers[qi] !== undefined) return;
            answers[qi] = oi;
            if(oi === qList[qi].correct) resultStats.correct++; else resultStats.wrong++;
            updateStats(); render();
        }

        function checkDS(qi, si, val) {
            if(!answers[qi]) answers[qi] = {};
            if(answers[qi][si] !== undefined) return;
            answers[qi][si] = val;
            if(val === qList[qi].subQuestions[si].correct) resultStats.correct++; else resultStats.wrong++;
            updateStats(); render();
        }

        function updateStats() {
            document.getElementById('live-correct').innerText = resultStats.correct;
            document.getElementById('live-wrong').innerText = resultStats.wrong;
        }

        function move(step) { cur += step; if(cur < 0) cur = 0; if(cur >= qList.length) cur = qList.length-1; render(); }

        function endQuiz() {
            clearInterval(timer);
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            let total = 36 + (6 * 4); 
            let score = ((resultStats.correct / total) * 100).toFixed(1);
            document.getElementById('score-box').innerText = score + "%";
            
            // Lưu kết quả
            let board = JSON.parse(localStorage.getItem('full_rank_local')) || [];
            board.push({
                name: document.getElementById('uName').value,
                class: document.getElementById('uClass').value,
                score: parseFloat(score),
                time: new Date().toLocaleTimeString('vi-VN')
            });
            localStorage.setItem('full_rank_local', JSON.stringify(board));
            loadLeaderboard();
        }
    </script>
</body>
</html>
